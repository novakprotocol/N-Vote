name: Quality gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public boundary
        run: python scripts/check_public_boundary.py
      - name: Check data contract
        run: python scripts/check_data_contract.py
      - name: Quality gate
        run: python scripts/quality_gate.py
      - name: Diff whitespace check
        run: git diff --check
