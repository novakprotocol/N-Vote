name: Friday Top 5

on:
  schedule:
    # Friday 23:00 America/New_York during EDT; Saturday 03:00 UTC.
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  friday-top5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build public issue data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/build_public_data.py
      - name: Tally Friday Top 5
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/tally_votes.py --label-top5
      - name: Validate public data
        run: |
          python scripts/check_public_boundary.py
          python scripts/check_data_contract.py
          python scripts/quality_gate.py
      - name: Commit Friday Top 5
        run: |
          if ! git diff --quiet -- data; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update Friday Top 5"
            git push
          fi
