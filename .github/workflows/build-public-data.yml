name: Build public data

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  build-public-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build public issue data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/build_public_data.py
      - name: Validate public data
        run: |
          python scripts/check_public_boundary.py
          python scripts/check_data_contract.py
          python scripts/quality_gate.py
      - name: Commit public data
        run: |
          if ! git diff --quiet -- data; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Build public N-Vote data"
            git push
          fi
